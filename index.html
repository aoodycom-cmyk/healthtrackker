<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070714" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Fat Loss Coach" />
    <title>متابعة إنقاص الدهون</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=rescue-export-12-1" />
    <style>
      .emergency-export {
        position: fixed;
        top: max(10px, env(safe-area-inset-top));
        left: 12px;
        z-index: 20;
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 14px;
        padding: 8px 10px;
        background: rgba(8, 13, 26, 0.82);
        color: #e8fff4;
        font: inherit;
        font-size: 12px;
        font-weight: 950;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(18px);
      }
    </style>
  </head>
  <body>
    <button id="emergencyExportBtn" class="emergency-export" type="button">نسخة بيانات</button>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">برنامجك اليومي</p>
          <h1>متابعة إنقاص الدهون</h1>
        </div>
        <input id="activeDate" class="date-picker" type="date" />
      </header>

      <main>
        <section id="dashboard" class="view active"></section>
        <section id="food-log" class="view"></section>
        <section id="add" class="view"></section>
        <section id="progress" class="view"></section>
        <section id="settings" class="view"></section>
        <section id="ai-coach" class="view"></section>
      </main>

      <nav class="bottom-nav" aria-label="التنقل الرئيسي">
        <button class="nav-item active" data-view="dashboard" title="الرئيسية">
          <span data-icon="home"></span><small>الرئيسية</small>
        </button>
        <button class="nav-item" data-view="food-log" title="الأكل">
          <span data-icon="utensils"></span><small>اليوم</small>
        </button>
        <button class="nav-item add-tab" data-action="open-quick-add" title="إضافة">
          <span data-icon="plus"></span><small>إضافة</small>
        </button>
        <button class="nav-item" data-view="progress" title="التقدم">
          <span data-icon="trending"></span><small>التقدم</small>
        </button>
        <button class="nav-item" data-view="settings" title="الإعدادات">
          <span data-icon="more"></span><small>المزيد</small>
        </button>
      </nav>
    </div>

    <div class="sheet-backdrop" id="quickAddBackdrop" aria-hidden="true"></div>
    <aside class="quick-sheet" id="quickAddSheet" aria-label="إضافة سريعة">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <p class="eyebrow">إضافة سريعة</p>
          <h2>سجل وجبة</h2>
        </div>
        <button class="btn icon secondary" type="button" data-action="close-quick-add" title="إغلاق">×</button>
      </div>
      <form id="quickFoodForm" class="sheet-form">
        <div class="field">
          <label>الوجبة</label>
          <select class="select" name="source" id="quickSource"></select>
        </div>
        <div class="two-cols">
          <div class="field">
            <label>الجرامات</label>
            <input class="input quick-grams" name="grams" type="number" min="1" step="1" value="250" />
          </div>
          <div class="field">
            <label>الصوص</label>
            <select class="select" name="sauceId" id="quickSauce"></select>
          </div>
        </div>
        <div class="field">
            <label>جرامات الصوص</label>
          <input class="input" name="sauceGrams" type="number" min="0" step="1" value="0" />
        </div>
        <div class="quick-preview" id="quickPreview"></div>
        <button class="btn sheet-primary" type="submit">إضافة الوجبة</button>
      </form>
      <div class="sheet-shortcuts">
        <button class="btn secondary" type="button" data-action="quick-food-search">بحث / باركود</button>
        <button class="btn secondary" type="button" data-action="quick-cardio">كارديو</button>
        <button class="btn secondary" type="button" data-action="quick-weight">وزن</button>
      </div>
    </aside>

    <template id="cardTemplate">
      <article class="metric-card">
        <span class="metric-label"></span>
        <strong class="metric-value"></strong>
        <small class="metric-note"></small>
      </article>
    </template>

    <script src="./services/usda.service.js"></script>
    <script src="./services/barcode.service.js"></script>
    <script src="./services/openai.service.js"></script>
    <script>
      (function setupEmergencyExport() {
        const STORAGE_KEY = "fatLossDashboard.v1";
        const SETTINGS_KEY = "fatLossDashboard.settings.v1";
        const BACKUP_KEY = "fatLossDashboard.backups.v1";
        const button = document.getElementById("emergencyExportBtn");

        function safeParse(raw) {
          try {
            return raw ? JSON.parse(raw) : null;
          } catch {
            return null;
          }
        }

        function countItems(state, key) {
          return Array.isArray(state?.[key]) ? state[key].length : 0;
        }

        function countMeaningful(state) {
          return countItems(state, "foodLogs")
            + countItems(state, "cardioLogs")
            + countItems(state, "resistanceLogs")
            + countItems(state, "progressLogs")
            + countItems(state, "savedDays")
            + countItems(state, "meals");
        }

        function buildEmergencyPayload() {
          const state = safeParse(localStorage.getItem(STORAGE_KEY));
          const settings = safeParse(localStorage.getItem(SETTINGS_KEY));
          const backups = safeParse(localStorage.getItem(BACKUP_KEY));
          const backupSummaries = Array.isArray(backups) ? backups.map((backup, index) => {
            const snapshot = safeParse(backup?.raw);
            return {
              index,
              createdAt: backup?.createdAt || null,
              counts: {
                foods: countItems(snapshot, "foods"),
                sauces: countItems(snapshot, "sauces"),
                meals: countItems(snapshot, "meals"),
                foodLogs: countItems(snapshot, "foodLogs"),
                cardioLogs: countItems(snapshot, "cardioLogs"),
                resistanceLogs: countItems(snapshot, "resistanceLogs"),
                progressLogs: countItems(snapshot, "progressLogs"),
                savedDays: countItems(snapshot, "savedDays")
              },
              meaningfulItems: countMeaningful(snapshot)
            };
          }) : [];
          const rawLocalStorage = {};
          for (let index = 0; index < localStorage.length; index += 1) {
            const key = localStorage.key(index);
            if (key && key.includes("fatLossDashboard")) rawLocalStorage[key] = localStorage.getItem(key);
          }
          return {
            app: "healthtrackker",
            exportType: "emergency-home-screen-export",
            exportedAt: new Date().toISOString(),
            origin: location.origin,
            counts: {
              foods: countItems(state, "foods"),
              sauces: countItems(state, "sauces"),
              meals: countItems(state, "meals"),
              foodLogs: countItems(state, "foodLogs"),
              cardioLogs: countItems(state, "cardioLogs"),
              resistanceLogs: countItems(state, "resistanceLogs"),
              progressLogs: countItems(state, "progressLogs"),
              savedDays: countItems(state, "savedDays")
            },
            meaningfulItems: countMeaningful(state),
            state,
            settings,
            backups,
            backupSummaries,
            rawLocalStorage
          };
        }

        function downloadText(filename, text) {
          const blob = new Blob([text], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        }

        async function copyText(text) {
          try {
            await navigator.clipboard.writeText(text);
            alert("تم نسخ بياناتك. أرسلها الآن.");
          } catch {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand("copy");
            textarea.remove();
            alert("تم تجهيز بياناتك للنسخ.");
          }
        }

        button?.addEventListener("click", async () => {
          const payload = buildEmergencyPayload();
          const backupTotal = payload.backupSummaries.reduce((sum, backup) => sum + backup.meaningfulItems, 0);
          const total = payload.meaningfulItems + backupTotal + Object.keys(payload.rawLocalStorage).length;
          const text = JSON.stringify(payload, null, 2);
          const filename = `healthtrackker-emergency-${new Date().toISOString().slice(0, 10)}.json`;

          if (total === 0) {
            alert("لم أجد بيانات ظاهرة أو نسخ مخفية، لكن سأحاول تجهيز ملف فحص الآن.");
          }

          const file = new File([text], filename, { type: "application/json" });
          if (navigator.canShare?.({ files: [file] })) {
            try {
              await navigator.share({ title: "Healthtrackker backup", text: "نسخة بيانات Healthtrackker", files: [file] });
              return;
            } catch {}
          }

          try {
            downloadText(filename, text);
          } catch {
            await copyText(text);
          }
        });
      })();
    </script>
    <script>
      Promise.all([
        "serviceWorker" in navigator
          ? navigator.serviceWorker.getRegistrations().then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
          : Promise.resolve(),
        "caches" in window
          ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
          : Promise.resolve()
      ]).then(() => {
        if (navigator.serviceWorker?.controller && !sessionStorage.getItem("cache-cleared-once")) {
          sessionStorage.setItem("cache-cleared-once", "1");
          location.reload();
        }
      }).catch(() => {});
    </script>
    <script src="./bundled-restore.js?v=rescue-export-12-1"></script>
    <script src="./app.js?v=rescue-export-12-1"></script>
  </body>
</html>
